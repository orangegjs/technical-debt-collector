name: Backend CI

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'backend/**'

jobs:
  backend-quality-check:
    name: Backend Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest httpx
      
      - name: Lint with flake8
        working-directory: ./backend
        run: |
          # Stop on critical errors only
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=__pycache__,*.pyc,venv,env
        continue-on-error: true
      
      - name: Check app can import
        working-directory: ./backend
        run: |
          python -c "
          import sys
          try:
              from main import app
              print('✓ FastAPI app imported successfully')
              sys.exit(0)
          except Exception as e:
              print(f'✗ Failed to import app: {e}')
              sys.exit(1)
          "

      - name: Run tests
        working-directory: ./backend
        run: pytest tests/ --verbose
      
      - name: Summary
        run: |
          echo "✅ Backend CI completed"
          echo "Note: Some checks may have warnings - this is normal for initial setup"
